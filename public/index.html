<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="gradient-text">THE VAULT</h1>
            <p>Stats Platform</p>
        </div>
        <div class="card">
            <p>If this card has a dark purple-glass background, your styles are working!</p>
        </div>
        <div class="kpi-strip">
            <div class="kpi-card">
                <div class="kpi-badge badge-purple">Test</div>
                <div class="kpi-value">42</div>
                <div class="kpi-label">Some Stat</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-badge badge-blue">Test</div>
                <div class="kpi-value">7h</div>
                <div class="kpi-label">Playtime</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-badge badge-green">Test</div>
                <div class="kpi-value">Level 3</div>
                <div class="kpi-label">Your Level</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-badge badge-red">Test</div>
                <div class="kpi-value">5/9</div>
                <div class="kpi-label">Achievements</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderNavbar);
    </script>
</body>
</html>

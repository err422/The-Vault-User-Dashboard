<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stats - The Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">The Vault</a>
        
        <div class="navbar-links">
            <a href="/">Dashboard</a>
            <a href="/mystats.html" class="active">My Stats</a>
        </div>
        
        <div class="user-menu">
            <div class="live-pill">
                <div class="live-dot"></div>
                LIVE
            </div>
            <div id="user-menu-content">
                <!-- Filled by JavaScript -->
            </div>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading your stats...</p>
    </div>

    <!-- Sign In Form (shown if not logged in) -->
    <div id="auth-form" style="display: none;">
        <div class="container" style="max-width: 480px; margin-top: 60px;">
            <div class="card">
                <div class="card-body" style="padding: 40px;">
                    <div style="text-align: center; margin-bottom: 32px;">
                        <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">
                            Sign In
                        </h1>
                        <p style="color: var(--muted2); font-size: 14px;">
                            View your personal stats
                        </p>
                    </div>

                    <form id="signin-form">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input 
                                type="email" 
                                id="email" 
                                class="form-input" 
                                placeholder="your@email.com"
                                required
                            >
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input" 
                                placeholder="••••••••"
                                required
                            >
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                            Sign In
                        </button>
                    </form>
                    
                    <p style="text-align: center; margin-top: 24px; color: var(--muted2); font-size: 13px;">
                        Don't have an account? Sign up on 
                        <a href="https://err422.github.io/The-Vault/" target="_blank" style="color: var(--accent); text-decoration: none;">
                            The Vault
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Personal Stats (shown if logged in) -->
    <div id="personal-stats" style="display: none;">
        <!-- Will be filled by JavaScript -->
    </div>

    <!-- Chart.js for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <!-- Our Scripts -->
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script src="mystats.js"></script>
</body>
</html>

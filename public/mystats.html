<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stats - The Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar will be injected -->
    
    <div class="container">
        <!-- Loading State -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        
        <!-- Sign In Form (shown if not logged in) -->
        <div id="auth-form" style="display: none;">
            <div class="page-header">
                <h1>Sign In</h1>
                <p>View your personal stats</p>
            </div>
            
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <form id="signin-form">
                    <div class="form-group">
                        <label class="form-label" style="color: #333;">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            style="color: #333; background: white; border-color: #ddd;"
                            placeholder="your@email.com"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" style="color: #333;">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            style="color: #333; background: white; border-color: #ddd;"
                            placeholder="••••••••"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">
                        Sign In
                    </button>
                </form>
                
                <p style="text-align: center; margin-top: 20px; color: #666;">
                    Don't have an account? Sign up on 
                    <a href="https://err422.github.io/The-Vault/" target="_blank" style="color: #667eea;">
                        The Vault
                    </a>
                </p>
            </div>
        </div>
        
        <!-- Personal Stats (shown if logged in) -->
        <div id="personal-stats" style="display: none;">
            <!-- Will be filled by JavaScript -->
        </div>
    </div>
    
    <!-- Chart.js for 7-day chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <!-- Our Scripts -->
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script src="mystats.js"></script>
</body>
</html>
